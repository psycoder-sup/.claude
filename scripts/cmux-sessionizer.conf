# cmux-sessionizer configuration
# See: ~/.claude/scripts/cmux-sessionizer for usage

# Override default search paths (default: ~/ ~/00_Code)
CS_SEARCH_PATHS=(
  ~/00_Code
)

# Add extra search paths (append to CS_SEARCH_PATHS)
# Suffix with :N to set search depth for that path
# CS_EXTRA_SEARCH_PATHS=(~/ghq:3 ~/Git:3 ~/.config:2)

# Override max search depth (default: 1)
CS_MAX_DEPTH=2
